<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Document</title>
    </head>
    <body>
        <div id="canvas"></div>
        <button onclick="predict()">Predict</button>
        <div id="results"></div>
        <script>
            let canvasElement = document.getElementById('canvas');
            let cells = [];

            for(let i = 0; i < 28; i++) {
                let row = document.createElement('div');
                row.classList.add('row');
                row.style.display = 'flex';
                cells.push([]);
                for(let j = 0; j < 28; j++) {
                    let cell = document.createElement('div');
                    cell.classList.add('cell');
                    row.appendChild(cell);
                    cell.style.width = '20px';
                    cell.style.height = '20px';
                    cell.style.border = '1px solid gray';
                    cell.style.backgroundColor = 'white';
                    cell.id = `cell-${i}-${j}`;
                    cells[i].push(0);
                }
                canvasElement.appendChild(row);
            }

            var mouseDown = false;

            function addCell(cell) {
                let id = cell.id.split('-');
                let i = parseInt(id[1]);
                let j = parseInt(id[2]);

                for(let x = -1; x <= 1; x++) {
                    for(let y = -1; y <= 1; y++) {
                        let newI = i + x;
                        let newJ = j + y;
                        if(newI >= 0 && newI < 28 && newJ >= 0 && newJ < 28) {
                            let value = 255 - (Math.abs(x) + Math.abs(y)) * 70;
                            let cellElement = document.getElementById(`cell-${newI}-${newJ}`);
                            cells[newI][newJ] = Math.max(cells[newI][newJ], value);
                            cellElement.style.backgroundColor = "black";
                            cellElement.style.opacity = cells[newI][newJ] / 255;
                        }
                    }
                }
            }

            window.addEventListener("mousedown", function() {
                mouseDown = true;
                if(event.target.classList.contains('cell')) {
                    addCell(event.target);
                }
            });

            window.addEventListener("mouseup", function() {
                mouseDown = false;
            });

            window.addEventListener("mousemove", function(event) {
                if(mouseDown) {
                    let target = event.target;
                    if(target.classList.contains('cell')) {
                        addCell(target);
                    }
                }
            });

            async function predict() {
                let body = "";
                for(let i = 0; i < 28; i++) {
                    for(let j = 0; j < 28; j++) {
                        body += cells[i][j] + ",";
                    }
                }
                let response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/text'
                    },
                    body: body
                })

                let result = await response.text();
                result = result.split(',');
                let resultsDiv = document.getElementById('results');
                let maxResult = -Infinity;
                let maxIndex = -1;
                for(let i = 0; i < result.length; i++) {
                    let value = parseFloat(result[i]);
                    if(value > maxResult) {
                        maxResult = value;
                        maxIndex = i;
                    }
                }
                resultsDiv.innerHTML = `Predicted digit: ${maxIndex}`;
            }
        </script>
    </body>
</html>
